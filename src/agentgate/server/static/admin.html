<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>AgentGate Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #222;
            --text: #e5e5e5;
            --text-muted: #888;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--accent); text-decoration: none; }

        .topbar {
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar .logo { font-size: 18px; font-weight: 700; }
        .topbar .logo span { color: var(--accent); }
        .topbar nav { display: flex; gap: 16px; font-size: 14px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        .auth-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .auth-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 32px; width: 100%; max-width: 400px; text-align: center;
        }
        .auth-box h2 { font-size: 20px; margin-bottom: 8px; }
        .auth-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .auth-box input {
            width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px;
        }
        .auth-box input:focus { outline: none; border-color: var(--accent); }
        .auth-box button, .btn {
            padding: 10px 18px; background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .auth-box button:hover, .btn:hover { background: var(--accent-hover); }
        .auth-error { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; margin-top: 32px; }
        .section-title:first-child { margin-top: 0; }

        .agent-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px; margin-bottom: 16px;
        }
        .agent-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; cursor: pointer;
        }
        .agent-header h3 { font-size: 16px; font-weight: 600; }
        .agent-meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; }
        .agent-details { display: none; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 12px; }
        .agent-details.open { display: block; }

        .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-mini { font-size: 13px; }
        .stat-mini .label { color: var(--text-muted); }
        .stat-mini .val { font-size: 20px; font-weight: 700; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }

        table {
            width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px;
        }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }

        .no-data { color: var(--text-muted); font-style: italic; font-size: 13px; }
        .hidden { display: none !important; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn {
            padding: 6px 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-muted); font-size: 12px;
            cursor: pointer; font-weight: 600;
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        @media (max-width: 600px) {
            .agent-meta { flex-direction: column; gap: 4px; }
            .stats-row { flex-direction: column; gap: 8px; }
            .container { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div><a href="/"><span class="logo">Agent<span>Gate</span></span></a> &nbsp; Admin</div>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/docs">API Docs</a>
    </nav>
</div>

<div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
        <h2>Admin Access</h2>
        <p>Enter your API key to manage agents.</p>
        <input type="password" id="api-key-input" placeholder="API key" autofocus>
        <button onclick="tryAuth()" style="width:100%">Access Admin</button>
        <div class="auth-error" id="auth-error">Invalid API key. Try again.</div>
    </div>
</div>

<div class="container hidden" id="admin">
    <div class="section-title">Registered Agents</div>
    <div id="agents-list">
        <p class="no-data">Loading...</p>
    </div>
</div>

<script>
let apiKey = localStorage.getItem("ag_dashboard_key") || "";

function tryAuth() {
    const input = document.getElementById("api-key-input");
    apiKey = input.value.trim();
    if (!apiKey) return;
    fetchAgents().then(ok => {
        if (ok) {
            localStorage.setItem("ag_dashboard_key", apiKey);
            document.getElementById("auth-overlay").classList.add("hidden");
            document.getElementById("admin").classList.remove("hidden");
        } else {
            document.getElementById("auth-error").style.display = "block";
            input.value = ""; input.focus();
        }
    });
}

document.getElementById("api-key-input").addEventListener("keydown", e => {
    if (e.key === "Enter") tryAuth();
});

if (apiKey) {
    fetchAgents().then(ok => {
        if (ok) {
            document.getElementById("auth-overlay").classList.add("hidden");
            document.getElementById("admin").classList.remove("hidden");
        } else { localStorage.removeItem("ag_dashboard_key"); apiKey = ""; }
    });
}

async function fetchAgents() {
    try {
        const resp = await fetch("/agents/");
        if (!resp.ok) return false;
        const agents = await resp.json();
        renderAgents(agents);
        return true;
    } catch { return false; }
}

function renderAgents(agents) {
    const el = document.getElementById("agents-list");
    if (!agents.length) { el.innerHTML = '<p class="no-data">No agents registered.</p>'; return; }
    el.innerHTML = agents.map(a => `
        <div class="agent-card" id="card-${a.id}">
            <div class="agent-header" onclick="toggleAgent('${a.id}')">
                <div>
                    <h3>${esc(a.name)} <span class="badge badge-blue">v${esc(a.version)}</span></h3>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${esc(a.description || "No description")}</div>
                </div>
                <div class="agent-meta">
                    <span>${a.id.substring(0,8)}...</span>
                    <span>${a.created_at ? a.created_at.substring(0,10) : ""}</span>
                </div>
            </div>
            <div class="agent-details" id="details-${a.id}">
                <div class="stats-row" id="usage-${a.id}">
                    <p class="no-data">Loading usage...</p>
                </div>
                <div class="tab-bar">
                    <div class="tab-btn active" onclick="showTab('${a.id}','logs')">Logs</div>
                    <div class="tab-btn" onclick="showTab('${a.id}','billing')">Billing</div>
                    <div class="tab-btn" onclick="showTab('${a.id}','health')">Health</div>
                </div>
                <div id="tab-logs-${a.id}"><p class="no-data">Loading logs...</p></div>
                <div id="tab-billing-${a.id}" class="hidden"><p class="no-data">Loading billing...</p></div>
                <div id="tab-health-${a.id}" class="hidden"><p class="no-data">Loading health...</p></div>
            </div>
        </div>
    `).join("");
}

const loadedAgents = new Set();

async function toggleAgent(id) {
    const el = document.getElementById("details-" + id);
    if (el.classList.contains("open")) { el.classList.remove("open"); return; }
    el.classList.add("open");
    if (loadedAgents.has(id)) return;
    loadedAgents.add(id);
    loadUsage(id);
    loadLogs(id);
    loadBilling(id);
    loadHealth(id);
}

function showTab(id, tab) {
    ["logs","billing","health"].forEach(t => {
        document.getElementById("tab-" + t + "-" + id).classList.toggle("hidden", t !== tab);
    });
    const card = document.getElementById("card-" + id);
    card.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent.toLowerCase() === tab);
    });
}

async function loadUsage(id) {
    const el = document.getElementById("usage-" + id);
    try {
        const r = await fetch(`/agents/${id}/usage`, { headers: { Authorization: "Bearer " + apiKey } });
        if (!r.ok) { el.innerHTML = '<p class="no-data">Could not load usage.</p>'; return; }
        const d = await r.json();
        el.innerHTML = `
            <div class="stat-mini"><div class="label">Invocations</div><div class="val">${d.total_invocations}</div></div>
            <div class="stat-mini"><div class="label">Errors</div><div class="val" style="color:${d.total_errors > 0 ? 'var(--red)' : 'inherit'}">${d.total_errors}</div></div>
            <div class="stat-mini"><div class="label">Avg Latency</div><div class="val">${d.avg_latency_ms}ms</div></div>
            <div class="stat-mini"><div class="label">Last Call</div><div class="val" style="font-size:14px">${d.last_invocation ? d.last_invocation.substring(0,19).replace("T"," ") : "never"}</div></div>
        `;
    } catch { el.innerHTML = '<p class="no-data">Error loading usage.</p>'; }
}

async function loadLogs(id) {
    const el = document.getElementById("tab-logs-" + id);
    try {
        const r = await fetch(`/agents/${id}/logs?limit=20`, { headers: { Authorization: "Bearer " + apiKey } });
        if (!r.ok) { el.innerHTML = '<p class="no-data">Could not load logs.</p>'; return; }
        const logs = await r.json();
        if (!logs.length) { el.innerHTML = '<p class="no-data">No logs yet.</p>'; return; }
        el.innerHTML = `<table><thead><tr><th>Time</th><th>Status</th><th>Latency</th><th>IP</th><th>Task ID</th></tr></thead><tbody>
            ${logs.map(l => `<tr>
                <td>${l.created_at.substring(0,19).replace("T"," ")}</td>
                <td><span class="badge ${l.status==="success"?"badge-green":"badge-red"}">${l.status}</span></td>
                <td>${l.latency_ms}ms</td>
                <td>${esc(l.caller_ip)}</td>
                <td>${esc(l.task_id||"-")}</td>
            </tr>`).join("")}
        </tbody></table>`;
    } catch { el.innerHTML = '<p class="no-data">Error loading logs.</p>'; }
}

async function loadBilling(id) {
    const el = document.getElementById("tab-billing-" + id);
    try {
        const r = await fetch(`/agents/${id}/usage/breakdown?period=day&days=30`, { headers: { Authorization: "Bearer " + apiKey } });
        if (!r.ok) { el.innerHTML = '<p class="no-data">Could not load billing.</p>'; return; }
        const d = await r.json();
        const rows = d.breakdown || [];
        if (!rows.length) { el.innerHTML = '<p class="no-data">No billing data yet.</p>'; return; }
        el.innerHTML = `<table><thead><tr><th>Date</th><th>Invocations</th><th>Errors</th><th>Avg Latency</th></tr></thead><tbody>
            ${rows.map(r => `<tr>
                <td>${r.period.substring(0,10)}</td>
                <td>${r.invocations}</td>
                <td>${r.errors}</td>
                <td>${r.avg_latency_ms}ms</td>
            </tr>`).join("")}
        </tbody></table>`;
    } catch { el.innerHTML = '<p class="no-data">Error loading billing.</p>'; }
}

async function loadHealth(id) {
    const el = document.getElementById("tab-health-" + id);
    try {
        const r = await fetch(`/agents/${id}/health`);
        if (!r.ok) { el.innerHTML = '<p class="no-data">Could not load health.</p>'; return; }
        const d = await r.json();
        const badge = d.status === "healthy" ? "badge-green" : d.status === "unhealthy" ? "badge-red" : "badge-yellow";
        el.innerHTML = `
            <div style="display:flex;gap:20px;align-items:center;margin-top:8px">
                <span class="badge ${badge}">${d.status}</span>
                ${d.latency_ms ? `<span style="font-size:13px;color:var(--text-muted)">Latency: ${d.latency_ms}ms</span>` : ""}
                ${d.last_check ? `<span style="font-size:13px;color:var(--text-muted)">Last check: ${d.last_check.substring(0,19).replace("T"," ")}</span>` : ""}
                ${d.error ? `<span style="font-size:13px;color:var(--red)">Error: ${esc(d.error)}</span>` : ""}
            </div>`;
    } catch { el.innerHTML = '<p class="no-data">Error loading health.</p>'; }
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>

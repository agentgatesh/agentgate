<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Reset password — AgentGate</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --border: #222;
            --text: #e5e5e5; --text-muted: #888;
            --accent: #3b82f6; --accent-hover: #60a5fa;
            --green: #22c55e; --red: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        nav { border-bottom: 1px solid var(--border); padding: 16px 0; }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text); }
        .logo span { color: var(--accent); }
        nav .links { display: flex; gap: 24px; font-size: 14px; }
        nav .links a { color: var(--text-muted); }
        .content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 48px 24px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; width: 100%; max-width: 420px;
        }
        .card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .card .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .field input {
            width: 100%; padding: 10px 14px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 15px; outline: none;
        }
        .field input:focus { border-color: var(--accent); }
        .btn {
            display: block; width: 100%; padding: 12px;
            background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg {
            padding: 10px 14px; border-radius: 8px;
            font-size: 14px; margin-bottom: 16px; display: none;
        }
        .msg.success {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
            color: var(--green);
        }
        .msg.error {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: var(--red);
        }
        footer {
            border-top: 1px solid var(--border); padding: 24px 0;
            text-align: center; color: var(--text-muted); font-size: 14px;
        }
        footer a { color: var(--text-muted); }
    </style>
</head>
<body>
{% include "partials/_nav.html" %}
<div class="content">
    <div class="card">
        <h1>Set a new password</h1>
        <p class="subtitle">Choose something at least 8 characters long.</p>
        <div class="msg" id="msg"></div>
        <div class="field">
            <label for="password">New password</label>
            <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" placeholder="Repeat it" autocomplete="new-password">
        </div>
        <button class="btn" id="submitBtn" onclick="doReset()">Update password</button>
    </div>
</div>
{% include "partials/_footer.html" %}
<script>
const token = new URLSearchParams(window.location.search).get('token') || '';
if (!token) {
    document.getElementById('msg').textContent = 'Missing reset token. Request a fresh link.';
    document.getElementById('msg').className = 'msg error';
    document.getElementById('msg').style.display = 'block';
    document.getElementById('submitBtn').disabled = true;
}
async function doReset() {
    const pwd = document.getElementById('password').value;
    const cfm = document.getElementById('confirm').value;
    const msgEl = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    msgEl.style.display = 'none';
    if (pwd.length < 8) {
        msgEl.textContent = 'Password must be at least 8 characters.';
        msgEl.className = 'msg error'; msgEl.style.display = 'block'; return;
    }
    if (pwd !== cfm) {
        msgEl.textContent = 'Passwords do not match.';
        msgEl.className = 'msg error'; msgEl.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
        const res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: pwd }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Reset failed');
        msgEl.textContent = data.message + ' Redirecting to sign in...';
        msgEl.className = 'msg success'; msgEl.style.display = 'block';
        setTimeout(() => { window.location.href = '/login'; }, 2000);
    } catch (e) {
        msgEl.textContent = e.message;
        msgEl.className = 'msg error'; msgEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Update password';
    }
}
</script>
</body>
</html>

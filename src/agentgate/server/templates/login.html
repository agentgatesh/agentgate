<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <title>Sign In — AgentGate</title>
    <meta name="description" content="Sign in to your AgentGate account to manage agents, billing, and analytics.">
    <link rel="canonical" href="https://agentgate.sh/login">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://agentgate.sh/login">
    <meta property="og:title" content="Sign In — AgentGate">
    <meta property="og:description" content="Sign in to your AgentGate account to manage agents, billing, and analytics.">
    <meta property="og:site_name" content="AgentGate">
    <meta property="og:image" content="https://agentgate.sh/static/og_image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sign In — AgentGate">
    <meta name="twitter:description" content="Sign in to your AgentGate account to manage agents, billing, and analytics.">
    <meta name="twitter:image" content="https://agentgate.sh/static/og_image.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #222;
            --text: #e5e5e5;
            --text-muted: #888;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --green: #22c55e;
            --red: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        nav {
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 700; color: var(--text); }
        .logo span { color: var(--accent); }
        nav .links { display: flex; gap: 24px; font-size: 14px; }
        nav .links a { color: var(--text-muted); }
        nav .links a:hover { color: var(--text); }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .card .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .field input {
            width: 100%; padding: 10px 14px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 15px; outline: none; transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--accent); }
        .btn {
            display: block; width: 100%; padding: 12px;
            background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: var(--red); padding: 10px 14px; border-radius: 8px;
            font-size: 14px; margin-bottom: 16px; display: none;
        }
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0; text-align: center;
            color: var(--text-muted); font-size: 14px;
        }
        footer a { color: var(--text-muted); }
        footer a:hover { color: var(--text); }
        @media (max-width: 480px) {
            .card { padding: 24px; }
            nav .links { display: none; }
        }
    </style>
</head>
<body>
{% include "partials/_nav.html" %}
<div class="content">
    <div class="card">
        <h1>Sign in</h1>
        <p class="subtitle">Access your AgentGate account.</p>

        <div class="error-msg" id="errorMsg"></div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <p style="text-align:right;margin:-8px 0 16px;font-size:13px">
            <a href="/forgot-password" style="color:var(--text-muted)">Forgot password?</a>
        </p>

        <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

        <div style="display:flex;align-items:center;gap:12px;margin:24px 0 16px">
            <div style="flex:1;height:1px;background:var(--border)"></div>
            <span style="color:var(--text-muted);font-size:13px">or continue with</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>

        <div style="display:flex;gap:12px">
            <a href="/auth/google" class="btn" style="flex:1;text-align:center;background:#4285f4;text-decoration:none;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </a>
            <a href="/auth/github" class="btn" style="flex:1;text-align:center;background:#333;text-decoration:none;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
            </a>
        </div>

        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-muted)">
            Don't have an account? <a href="/signup">Sign up free</a>
        </p>
    </div>
</div>
{% include "partials/_footer.html" %}

<script>
    // Show error from OAuth redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        const errEl = document.getElementById('errorMsg');
        const msgs = {
            invalid_state: 'Authentication failed. Please try again.',
            token_failed: 'Could not complete authentication. Please try again.',
            oauth_failed: 'OAuth provider error. Please try again.',
            no_email: 'No email found on your account. Please use email/password signup.',
            missing_token: 'That link is missing its token. Check your email and click the full link.',
            invalid_or_expired_token: 'That verification link is invalid or has expired.',
            org_missing: 'That account no longer exists.',
        };
        errEl.textContent = msgs[params.get('error')] || 'Authentication failed.';
        errEl.style.display = 'block';
    }

    async function doLogin() {
        const emailEl = document.getElementById('email');
        const passEl = document.getElementById('password');
        const errEl = document.getElementById('errorMsg');
        const btn = document.getElementById('loginBtn');

        const email = emailEl.value.trim();
        const password = passEl.value;

        errEl.style.display = 'none';

        if (!email || !email.includes('@')) {
            errEl.textContent = 'A valid email is required.';
            errEl.style.display = 'block';
            return;
        }
        if (!password) {
            errEl.textContent = 'Password is required.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.detail || 'Login failed');
            }

            window.location.href = '/account';
        } catch (e) {
            errEl.textContent = e.message;
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });
</script>

</body>
</html>

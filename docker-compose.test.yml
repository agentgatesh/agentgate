services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentgate_test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: agentgate_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

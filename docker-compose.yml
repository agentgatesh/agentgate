services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: agentgate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://agentgate:${DB_PASSWORD:-changeme}@db:5432/agentgate
      SECRET_KEY: ${SECRET_KEY:-changeme}
      API_KEY: ${API_KEY}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"

  echo-agent:
    build: examples/echo-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"

  calc-agent:
    build: examples/calc-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"

  chain-agent:
    build: examples/chain-agent
    restart: unless-stopped
    environment:
      AGENTGATE_URL: http://api:8000
    ports:
      - "127.0.0.1:9002:9002"

volumes:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: agentgate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://agentgate:${DB_PASSWORD:-changeme}@db:5432/agentgate
      SECRET_KEY: ${SECRET_KEY:-changeme}
      API_KEY: ${API_KEY}
      REDIS_URL: redis://redis:6379/0
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      BASE_URL: ${BASE_URL:-https://agentgate.sh}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      DEPLOYER_URL: http://deployer:8100
      DEPLOYER_SECRET: ${DEPLOYER_SECRET:-changeme}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-AgentGate <noreply@agentgate.sh>}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    # No docker.sock: the api container cannot talk to Docker directly.
    # All container lifecycle ops go through the deployer sidecar.

  deployer:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "agentgate.deployer.main"]
    environment:
      DEPLOYER_SECRET: ${DEPLOYER_SECRET:-changeme}
      DEPLOY_DIR: /data/deploys
      DOCKER_NETWORK: ${DOCKER_NETWORK:-agentgate_default}
      DEPLOY_PORT_START: "9100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deploy_data:/data/deploys
    # Bound only on the compose network — no host port published.

  echo-agent:
    build: examples/echo-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"

  calc-agent:
    build: examples/calc-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"

  chain-agent:
    build: examples/chain-agent
    restart: unless-stopped
    environment:
      AGENTGATE_URL: http://api:8000
    ports:
      - "127.0.0.1:9002:9002"

volumes:
  pgdata:
  deploy_data:
